<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="description"
          content="A web app to read and search the Catholic Public Domain Version (CPDV) of the Bible">
     <title>The Bible — Catholic Public Domain Version (CPDV)</title>
     <script src="bible.js" type="module" defer></script>
     <link rel="stylesheet" href="bible.css">
</head>

<body>
     <div id="bible">
          <h1 id="bible-header">Bible</h1>
          <main id="bible-main">
               <div id="bible-box">
                    <div id="bible-input-row">
                         <div>
                              <label for="bible-book">Book</label><br>
                              <input id="bible-book" type="text">
                         </div>
                         <div>
                              <label for="bible-chapter">Chapter</label><br>
                              <input id="bible-chapter" inputmode="numeric" pattern="\d[1,3]" size="3" maxlength="3">
                         </div>
                         <div>
                              <label for="bible-verse">Verse</label><br>
                              <input id="bible-verse" inputmode="numeric" pattern="\d[1,3]" size="3" maxlength="3">
                         </div>
                    </div>
                    <div id="bible-text" class="bible-text"></div>
               </div>
               <div id="bible-search" class="none">
                    <div>
                         <label for="bible-search-input">Search</label><br>
                         <input type="search" id="bible-search-input" name="Bible Search">
                    </div>
                    <div id="bible-search-text">
                         <div id="bible-info-text">
                              <b>Catholic Public Domain Version</b><br>
                              Ronald L. Conte Jr.<br>
                              Translator and Editor<br>
                              SacredBible.org<br>
                              <hr>Bible app by Photics
                         </div>
                    </div>
               </div>
          </main>
          <div id="bible-buttons" class="no-select">
               <div id="bible-back" class="button" role="button" title="Back">←</div>
               <div id="bible-search-button" class="button" role="button" title="Search">✝︎</div>
               <div id="bible-forward" class="button" role="button" title="Forward">→</div>
          </div>
     </div>
</body>

</html>
